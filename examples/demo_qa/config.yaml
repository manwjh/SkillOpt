name: demo-qa
skill_path: initial_skill.md
dataset_path: tasks.yaml
output_dir: artifacts

dataset:
  train_ratio: 0.5
  selection_ratio: 0.2
  seed: 42

models:
  target: mock
  optimizer: mock

optimization:
  epochs: 3
  rollout_batch_size: 4
  reflection_minibatch_size: 2
  learning_rate: 3
  learning_rate_min: 1
  schedule: cosine
  enable_rejected_buffer: true
  enable_slow_update: true
  enable_meta_skill: true
