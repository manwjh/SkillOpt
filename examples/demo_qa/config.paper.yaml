name: demo-qa-paper
skill_path: initial_skill.md
dataset_path: tasks.yaml
output_dir: artifacts
harness: direct_chat

dataset:
  train_ratio: 0.5
  selection_ratio: 0.2
  seed: 42

models:
  target: mock
  optimizer: mock

optimization:
  epochs: 3
  rollout_batch_size: 4
  rollout_accumulation_steps: 1
  reflection_minibatch_size: 2
  reflection_workers: 2
  reflection_refinement_rounds: 2
  merge_batch_size: 4
  learning_rate: 3
  learning_rate_min: 1
  schedule: cosine
  edit_mode: patch
  slow_update_samples: 3
  enable_rejected_buffer: true
  enable_slow_update: true
  enable_meta_skill: true
