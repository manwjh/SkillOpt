    input: Heat the apple and put it on the countertop.
    metadata:
      rooms: [kitchen, living room, bedroom]
      initial_state:
        location: living room
        inventory: []
        objects:
          apple: kitchen
          microwave: kitchen
          countertop: kitchen
      goal:
