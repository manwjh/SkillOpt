name: alfworld-mock
skill_path: initial_skill.md
dataset_path: tasks.yaml
output_dir: artifacts
harness: alfworld

dataset:
  train_ratio: 0.5
  selection_ratio: 0.25
  seed: 42

models:
  target: mock
  optimizer: mock

optimization:
  epochs: 2
  rollout_batch_size: 2
  reflection_minibatch_size: 2
  reflection_workers: 2
  merge_workers: 2
  reflection_refinement_rounds: 2
  learning_rate: 2
  schedule: cosine

baselines:
  methods: [textgrad]
