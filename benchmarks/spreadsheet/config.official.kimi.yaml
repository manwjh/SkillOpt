name: spreadsheet-official-kimi
skill_path: initial_skill.md
output_dir: artifacts_official_kimi
harness: spreadsheet
workspace_root: artifacts_official_kimi/workspaces

dataset:
  format: spreadsheetbench
  data_root: ../../data/spreadsheetbench/sample_data_200
  manifest: dataset.json
  limit: 8
  train_ratio: 0.5
  selection_ratio: 0.25
  seed: 42

models:
  target: kimi
  optimizer: kimi
  kimi_model: kimi-k2.6
  kimi_base_url: https://api.kimi.com/coding/v1
  kimi_disable_thinking: true
  kimi_coding_agent: true

optimization:
  epochs: 1
  rollout_batch_size: 2
  reflection_minibatch_size: 2
  reflection_refinement_rounds: 1
  learning_rate: 1
  schedule: constant
  enable_slow_update: false
  enable_meta_skill: false

baselines:
  methods: []
