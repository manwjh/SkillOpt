name: spreadsheet-claude-code
skill_path: initial_skill.md
dataset_path: tasks.yaml
output_dir: artifacts_claude
harness: claude_code
workspace_root: artifacts_claude/workspaces

dataset:
  train_ratio: 0.5
  selection_ratio: 0.25
  seed: 42

models:
  target: mock
  optimizer: mock

harness_config:
  cli:
    require_cli: true
    timeout: 600
    permission_mode: bypassPermissions

optimization:
  epochs: 1
  rollout_batch_size: 2
  reflection_minibatch_size: 2
  reflection_refinement_rounds: 1
  learning_rate: 1
  schedule: constant
  enable_slow_update: false
  enable_meta_skill: false
