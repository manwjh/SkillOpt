name: spreadsheetbench-full-kimi-code
skill_path: initial_skill_official.md
output_dir: artifacts_spreadsheetbench_full
harness: kimi_code
workspace_root: artifacts_spreadsheetbench_full/workspaces

dataset:
  format: spreadsheetbench
  data_root: ../../data/spreadsheetbench/sample_data_200
  manifest: dataset.json
  train_ratio: 0.5
  selection_ratio: 0.25
  seed: 42

models:
  target: mock
  optimizer: kimi
  kimi_model: kimi-k2.6
  kimi_base_url: https://api.kimi.com/coding/v1
  kimi_coding_agent: true

harness_config:
  cli:
    require_cli: true
    timeout: 900
    extra_args: ["--no-thinking", "--max-steps-per-turn", "40"]

optimization:
  epochs: 2
  rollout_batch_size: 2
  reflection_minibatch_size: 2
  reflection_refinement_rounds: 2
  learning_rate: 2
  schedule: cosine
  enable_slow_update: true
  enable_meta_skill: true

baselines:
  methods: []
