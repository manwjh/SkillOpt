name: spreadsheet-bench-baselines
skill_path: initial_skill.md
dataset_path: tasks.yaml
output_dir: artifacts
harness: spreadsheet

dataset:
  train_ratio: 0.5
  selection_ratio: 0.25
  seed: 42

models:
  target: mock
  optimizer: mock

optimization:
  epochs: 3
  rollout_batch_size: 2
  reflection_minibatch_size: 2
  reflection_refinement_rounds: 2
  learning_rate: 2
  schedule: cosine

baselines:
  methods: [textgrad, gepa, evoskill]
  textgrad_steps: 2
  gepa_generations: 1
  gepa_population: 3
  evoskill_generations: 1
