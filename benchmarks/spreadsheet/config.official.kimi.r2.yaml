name: spreadsheet-official-kimi-r2
skill_path: initial_skill_official.md
output_dir: artifacts_official_kimi_r2
harness: spreadsheet
workspace_root: artifacts_official_kimi_r2/workspaces

dataset:
  format: spreadsheetbench
  data_root: ../../data/spreadsheetbench/sample_data_200
  manifest: dataset.json
  limit: 12
  train_ratio: 0.5
  selection_ratio: 0.25
  seed: 42

models:
  target: kimi
  optimizer: kimi
  kimi_model: kimi-k2.6
  kimi_base_url: https://api.kimi.com/coding/v1
  kimi_disable_thinking: true
  kimi_coding_agent: true

optimization:
  epochs: 3
  rollout_batch_size: 2
  rollout_accumulation_steps: 1
  reflection_minibatch_size: 2
  reflection_refinement_rounds: 2
  reflection_workers: 2
  merge_workers: 2
  merge_batch_size: 4
  learning_rate: 2
  learning_rate_min: 1
  schedule: cosine
  slow_update_samples: 2
  enable_rejected_buffer: true
  enable_slow_update: true
  enable_meta_skill: true

baselines:
  methods: []
