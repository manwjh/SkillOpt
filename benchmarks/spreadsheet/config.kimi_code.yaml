name: spreadsheet-kimi-code-agent
skill_path: initial_skill_official.md
dataset_path: tasks.yaml
output_dir: artifacts_kimi_code
harness: kimi_code
workspace_root: artifacts_kimi_code/workspaces

dataset:
  train_ratio: 0.5
  selection_ratio: 0.25
  seed: 42

models:
  target: mock
  optimizer: kimi
  kimi_model: kimi-k2.6
  kimi_base_url: https://api.kimi.com/coding/v1
  kimi_disable_thinking: true
  kimi_coding_agent: true

harness_config:
  cli:
    require_cli: true
    timeout: 900
    extra_args: ["--no-thinking"]

optimization:
  epochs: 2
  rollout_batch_size: 2
  reflection_minibatch_size: 2
  reflection_refinement_rounds: 2
  learning_rate: 2
  schedule: cosine
  enable_slow_update: true
  enable_meta_skill: true

baselines:
  methods: []
