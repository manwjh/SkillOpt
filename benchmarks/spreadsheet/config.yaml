name: spreadsheet-bench
skill_path: initial_skill.md
dataset_path: tasks.yaml
output_dir: artifacts
harness: spreadsheet

dataset:
  train_ratio: 0.5
  selection_ratio: 0.25
  seed: 42

models:
  target: mock
  optimizer: mock

optimization:
  epochs: 3
  rollout_batch_size: 2
  reflection_minibatch_size: 2
  reflection_refinement_rounds: 2
  merge_batch_size: 4
  learning_rate: 2
  learning_rate_min: 1
  schedule: cosine
  slow_update_samples: 2
  enable_slow_update: true
  enable_meta_skill: true
