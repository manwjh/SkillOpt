name: office-qa-kimi
skill_path: initial_skill.md
dataset_path: tasks.yaml
output_dir: artifacts
harness: office_qa

dataset:
  train_ratio: 0.5
  selection_ratio: 0.25
  seed: 42

models:
  target: kimi
  optimizer: kimi
  kimi_model: kimi-k2.6
  kimi_base_url: https://api.kimi.com/coding/v1
  kimi_disable_thinking: true
  kimi_coding_agent: true

optimization:
  epochs: 2
  rollout_batch_size: 2
  reflection_minibatch_size: 2
  reflection_refinement_rounds: 2
  learning_rate: 2
  slow_update_samples: 2

baselines:
  methods: [textgrad]
  textgrad_steps: 2
